services:
  sqlserver:
    profiles: ["container-db"]
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cinemabd_sqlserver
    environment:
      SA_PASSWORD: ${SA_PASSWORD:-Your_strong_password123!}
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-Your_strong_password123!}\" -Q \"SELECT 1\" -C -No || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: CinemaBD.Api/Dockerfile
    container_name: cinemabd_api
    ports:
      - "5188:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${LOCAL_SQL_CONNECTION:-Server=host.docker.internal,1433;Database=CinemaBD;User Id=sa;Password=CHANGE_ME_LOCAL_SA_PASSWORD;TrustServerCertificate=True;MultipleActiveResultSets=True}
      DatabaseSeed__SqlFile: /app/Database/CinemaBD.sql
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Jwt__Issuer: ${JWT_ISSUER:-CinemaBD}
      Jwt__Audience: ${JWT_AUDIENCE:-CinemaBD.Client}
      VnPay__BaseUrl: ${VNPAY_BASE_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VnPay__ReturnUrl: ${WEB_PUBLIC_URL:-http://localhost:7188}/booking/payment-return
      VnPay__TmnCode: ${VNPAY_TMN_CODE:-CHANGE_ME}
      VnPay__HashSecret: ${VNPAY_HASH_SECRET:-CHANGE_ME}
    restart: on-failure

  web:
    build:
      context: .
      dockerfile: CinemaBD.Web/Dockerfile
    container_name: cinemabd_web
    ports:
      - "7188:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApiSettings__BaseUrl: http://api:8080/
      ConnectionStrings__DefaultConnection: Data Source=/app/data/cinemabd.web.db
      PaymentSettings__Url: ${VNPAY_BASE_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      PaymentSettings__ReturnUrl: ${WEB_PUBLIC_URL:-http://localhost:7188}/booking/payment-return
      PaymentSettings__TmnCode: ${VNPAY_TMN_CODE:-CHANGE_ME}
      PaymentSettings__HashSecret: ${VNPAY_HASH_SECRET:-CHANGE_ME}
      MomoAPI__MomoApiUrl: ${MOMO_API_URL:-https://test-payment.momo.vn/gw_payment/transactionProcessor}
      MomoAPI__AccessKey: ${MOMO_ACCESS_KEY:-CHANGE_ME}
      MomoAPI__SecretKey: ${MOMO_SECRET_KEY:-CHANGE_ME}
      MomoAPI__ReturnUrl: ${WEB_PUBLIC_URL:-http://localhost:7188}/booking/momo-return
      MomoAPI__NotifyUrl: ${WEB_PUBLIC_URL:-http://localhost:7188}/booking/momo-notify
      MomoAPI__PartnerCode: ${MOMO_PARTNER_CODE:-MOMO}
      MomoAPI__RequestType: ${MOMO_REQUEST_TYPE:-captureMoMoWallet}
      GoogleAuth__ClientId: ${GOOGLE_CLIENT_ID:-CHANGE_ME}
      GoogleAuth__ClientSecret: ${GOOGLE_CLIENT_SECRET:-CHANGE_ME}
      EmailSettings__SmtpHost: ${SMTP_HOST:-smtp.gmail.com}
      EmailSettings__SmtpPort: ${SMTP_PORT:-587}
      EmailSettings__EnableSsl: ${SMTP_ENABLE_SSL:-true}
      EmailSettings__FromName: ${SMTP_FROM_NAME:-CinemaBD}
      EmailSettings__FromEmail: ${SMTP_FROM_EMAIL:-your-gmail@example.com}
      EmailSettings__FromPassword: ${SMTP_PASSWORD:-your-gmail-app-password}
      EmailSettings__SMTPAccount: ${SMTP_FROM_EMAIL:-your-gmail@example.com}
      EmailSettings__SMTPPassword: ${SMTP_PASSWORD:-your-gmail-app-password}
    volumes:
      - web_data:/app/data
      - web_dataprotection_keys:/app/DataProtectionKeys
    depends_on:
      api:
        condition: service_started
    restart: on-failure

volumes:
  sqlserver_data:
  web_data:
  web_dataprotection_keys:
